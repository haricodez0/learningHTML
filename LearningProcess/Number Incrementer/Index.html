<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Incrementer</title>
    <style>
        .Container{
            height:100%;
            max-width:200px;
            width:100%;
            justify-content: center;
            align-items: center;
            display: flex;
            position:absolute;
        }
        
        body{
            place-items:center;
            display: grid;
            height:80vh;
        }
        

        
    </style>
</head>
<body>
    <div class="Container">
        <span id="Number-Display" class="Number">0</span>
    
        <button id="Plus">➕</button>
        <button id="Minus">➖</button>
        <button id="reset">🔄</button>
    
        <script src="Script.js"></script>
    </div>
    
</body>   

</html>
